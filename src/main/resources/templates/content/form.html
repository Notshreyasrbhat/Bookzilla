<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{layout/base :: head}"></th:block>
</head>
<body>
    <th:block th:replace="~{layout/base :: header}"></th:block>
    
    <div class="container">
        <div class="card" style="max-width: 600px; margin: 0 auto;">
            <h2 th:text="${content != null ? 'Edit Content' : 'Add Content'}">Add Content</h2>
            
            <form th:action="${content != null ? '/content/update/' + content.contentId : '/content/save'}" method="post">
                <div class="form-group" th:if="${content == null}">
                    <label for="genre">Content Genre</label>
                    <select id="genre" name="genre" required>
                        <option th:each="genre : ${genres}" th:value="${genre}" th:text="${genre}">GENRE</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="title">Title</label>
                    <input type="text" id="title" name="title" th:value="${content?.title}" required>
                </div>
                
                <div class="form-group">
                    <label for="author">Author</label>
                    <input type="text" id="author" name="author" th:value="${content?.author}" required>
                </div>
                
                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea id="description" name="description" rows="4" required th:text="${content?.description}"></textarea>
                </div>
                
                <button type="submit" class="btn">Save Content</button>
                <a href="/content" style="margin-left: 10px; color: #ccc;">Cancel</a>
            </form>
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{layout/base :: head}"></th:block>
</head>
<body>
    <th:block th:replace="~{layout/base :: header}"></th:block>
    
    <div class="container">
        <div class="card" style="max-width: 400px; margin: 0 auto; text-align: center;">
            <h2>Welcome Back</h2>
            <p>Sign in to your BooksTracker account</p>
            
            <div th:if="${param.error}" style="color: #cf6679; margin-bottom: 1rem;">
                Invalid email or password.
            </div>
            <div th:if="${param.logout}" style="color: #03dac6; margin-bottom: 1rem;">
                You have been logged out.
            </div>
            <div th:if="${param.registered}" style="color: #03dac6; margin-bottom: 1rem;">
                Registration successful! Please log in.
            </div>

            <form th:action="@{/login}" method="post">
                <div class="form-group" style="text-align: left;">
                    <label for="username">Email / Username</label>
                    <input type="text" id="username" name="username" required autofocus>
                </div>
                <div class="form-group" style="text-align: left;">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <button type="submit" class="btn" style="width: 100%;">Sign In</button>
            </form>
            <p style="margin-top: 1.5rem; font-size: 0.9em; color:#aaa;">
                Don't have an account? <a href="/register" style="color: var(--primary);">Register</a>
            </p>
        </div>
    </div>
</body>
</html>

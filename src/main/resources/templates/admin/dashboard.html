<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{layout/base :: head}"></th:block>
</head>
<body>
    <th:block th:replace="~{layout/base :: header}"></th:block>
    
    <div class="container">
        <h2>Admin Dashboard</h2>
        
        <div style="display: flex; gap: 2rem; margin-top: 2rem;">
            <div class="card" style="flex: 1; text-align: center;">
                <h3>Users</h3>
                <p style="color: #aaa;">Manage registered users</p>
                <a href="/admin/users" class="btn">View Users</a>
            </div>
            
            <div class="card" style="flex: 1; text-align: center;">
                <h3>Content</h3>
                <p style="color: #aaa;">Manage books, articles, podcasts</p>
                <a href="/content" class="btn">Manage Content</a>
                <a href="/content/new" class="btn" style="background:#555; margin-left:5px;">Add New</a>
            </div>
        </div>
    </div>
</body>
</html>
